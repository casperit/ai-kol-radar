<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI KOL 日报 - 历史存档</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #6366f1;
  --accent2: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.7;
  padding: 2rem 1rem;
}
.container { max-width: 860px; margin: 0 auto; }
header {
  text-align: center;
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 2rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: .5rem;
}
header p { color: var(--muted); font-size: .95rem; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.8rem;
  margin-bottom: 1.2rem;
  transition: border-color .2s;
}
.card:hover { border-color: var(--accent); }
.card a {
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-decoration: none;
  color: var(--text);
}
.card .date { font-size: 1.1rem; font-weight: 600; }
.card .meta { color: var(--muted); font-size: .9rem; }
.card .arrow { color: var(--accent); font-size: 1.3rem; }
.content { line-height: 1.9; }
.content h1 { font-size: 1.4rem; color: var(--accent); margin: 1.5rem 0 .8rem; }
.content h2 { font-size: 1.2rem; margin: 1.2rem 0 .6rem; }
.content p { margin-bottom: .6rem; color: var(--text); }
.content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.content strong { color: #a5b4fc; }
.back {
  display: inline-block;
  margin-bottom: 2rem;
  color: var(--accent);
  text-decoration: none;
  font-size: .9rem;
}
.back:hover { text-decoration: underline; }
.badge {
  display: inline-block;
  background: rgba(99,102,241,.15);
  color: var(--accent);
  border-radius: 6px;
  padding: .1rem .5rem;
  font-size: .8rem;
  margin-left: .5rem;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🤖 AI KOL 日报</h1>
    <p>42位 AI 领域 KOL 每日动态追踪</p>
  </header>
  
  <div class="card">
    <a href="2026-04-19.html">
      <div>
        <div class="date">2026-04-19</div>
        <div class="meta">0 位 KOL <span class="badge">0 条推文</span></div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="card">
    <a href="2026-04-17.html">
      <div>
        <div class="date">2026-04-17</div>
        <div class="meta">0 位 KOL <span class="badge">0 条推文</span></div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
